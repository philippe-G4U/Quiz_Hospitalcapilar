# =============================================
# Hospital Capilar — Quiz Netlify Configuration
# =============================================

[build]
  base = "."
  command = "npm install && cd packages/shared && npm install && cd ../quiz && npm install && npm run build"
  publish = "packages/quiz/dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  external_node_modules = ["resend"]

# PostHog reverse proxy — bypasses adblockers
# Daily ad spend sync — pulls Google Ads + Meta Ads → PostHog
[functions."sync-ad-spend"]
  schedule = "0 6 * * *"

# Sync GHL pipeline data → PostHog every hour
[functions."sync-ghl-posthog"]
  schedule = "17 * * * *"

# Reconcile Koibox → GHL: catches staff edits/cancellations made directly in Koibox
[functions."reconcile-koibox-ghl"]
  schedule = "*/15 * * * *"

# Enrich Meta-direct leads: backfill link_agendar / link_paywall + meta_form_directo tag
[functions."cron-enrich-meta-leads"]
  schedule = "*/5 * * * *"

# Safety net: detect contacts with `door` CF set but no opp in pipeline
# (ghl-proxy creation failures) and create the missing opp. Hourly.
[functions."cron-detect-orphan-opps"]
  schedule = "17 * * * *"

# Safety net: reconcile Stripe paid sessions vs GHL bono_pagado state (5–60 min)
# and paid-but-no-booking SLA (24–48h). Alerts via email on any drift.
[functions."cron-reconcile-payments"]
  schedule = "*/15 * * * *"

[[redirects]]
  from = "/ingest/static/*"
  to = "https://eu-assets.i.posthog.com/static/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/ingest/*"
  to = "https://eu.i.posthog.com/:splat"
  status = 200
  force = true
